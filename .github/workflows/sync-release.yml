name: Sync Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Read script version
        id: version
        shell: bash
        run: |
          version=$(python -c "from pathlib import Path; import re; text=Path('xhs_comment_collector.user.js').read_text(encoding='utf-8'); m=re.search(r'^// @version\s+(.+)$', text, re.M); print(m.group(1).strip() if m else 'unknown')")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        shell: bash
        run: |
          {
            echo "## XHS Comment Collector"
            echo
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Install: https://github.com/${{ github.repository }}/releases/latest/download/xhs_comment_collector.user.js"
            echo
            echo "## Recent Changes"
            git log -10 --pretty=format:'- %s'
            echo
          } > release_notes.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: xhs_comment_collector.user.js
          make_latest: true
          prerelease: false
          draft: false
